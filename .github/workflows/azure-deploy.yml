name: CI/CD Pipeline
on:
  push:
    branches:
      - master

jobs:
  # security-scan:
  #   name: Run Security Scan
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v3
  #     - name: Set up Node.js
  #       uses: actions/setup-node@v3
  #       with:
  #         node-version: '24'
  #     - name: Install dependencies
  #       run: yarn
  #     - name: Run audit
  #       run: yarn audit --level critical
 
  check-dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    # needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: yarn
      - name: Check for outdated dependencies
        run: yarn outdated
        
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: check-dependencies
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'
      - name: Install dependencies
        run: yarn
      - name: Run tests
        run: yarn test
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Clean up unnecessary files
        run: |
          rm -rf .git
          rm -rf .github
          rm -rf _actions
          rm -rf _PipelineMapping
          rm -rf _temp
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Account'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}